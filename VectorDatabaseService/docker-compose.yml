version: "3.3"

services:

  # ── Milvus dependencies ───────────────────────────────────────────────────

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ./volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Milvus standalone ─────────────────────────────────────────────────────

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.13
    command: ["milvus", "run", "standalone"]
    security_opt: # Configures security settings (e.g., bypassing kernel restrictions)
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
    ports:
      - "19530:19530"   # gRPC / SDK
      - "9091:9091"     # HTTP health / metrics
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Application ───────────────────────────────────────────────────────────

  vector-database-service:
    build:
      context: .               # adjust to your Dockerfile location
      dockerfile: Dockerfile
    image: vector-database-service:latest
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      # Milvus
      MILVUS_HOST: standalone
      MILVUS_PORT: 19530
      # LLM (only used when the llm profile / Ollama is running)
      OLLAMA_URL:   http://ollama:11434
      OLLAMA_MODEL: qwen2.5:1.5b
      # Uvicorn
      APP_PORT: 8000
    volumes:
      - ./data:/app/data:ro    # seed / fixture data (read-only inside container)
    depends_on:
      standalone:
        condition: service_healthy
    healthcheck:
      # Mirrors the /health endpoint pattern from health_controller.py
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s        # give the app time to load embedding models

  # ── LLM (Ollama) ────────────────────────────────────────────────

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ── Attu UI ─────────────────────────────────────────────────────

  attu:
    image: zilliz/attu:v2.4
    container_name: attu
    environment:
      MILVUS_URL: standalone:19530
    ports:
      - "8090:3000"
    depends_on:
      standalone:
        condition: service_healthy
  
  # ── Streamlit ───────────────────────────────────────────────────
  
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: streamlit
    ports:
      - "8501:8501"
    environment:
      API_URL: "http://vector-database-service:8000"
    depends_on:
      - vector-database-service
    restart: on-failure

# ── Named volumes ─────────────────────────────────────────────────────────────

volumes:
  ollama_data: {}
