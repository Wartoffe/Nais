spring.application.name=elasticsearch-service

spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
spring.elasticsearch.connection-timeout=5s
spring.elasticsearch.socket-timeout=30s

server.port=8080

logging.level.org.springframework.data.elasticsearch=DEBUG
logging.level.nais.search=DEBUG

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

app.redis.book-prefix=es:book:
app.redis.person-prefix=es:person:
