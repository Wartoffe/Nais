spring.application.name=request-service
server.port=8080

# Redis Configuration (overridable via environment variables)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
# spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}  # Uncomment if Redis requires auth

# Key prefix for all requests stored in Redis
app.redis.request-prefix=library:request:

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
spring.application.name=request-service
