version: "3.8"

services:
  #
  # ── Service Discovery ─────────────────────────────────────────────────────
  #
  eureka-server:
    build:
      context: ./EurekaService
      dockerfile: Dockerfile
    image: eureka-server:latest
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  #
  # ── Gateway ───────────────────────────────────────────────────────────────
  #
  gateway-api:
    build:
      context: ./GatewayService
      dockerfile: Dockerfile
    image: gateway-api:latest
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    depends_on:
      - eureka-server
    ports:
      - "9003:9000"

  #
  # ── Milvus stack (shared) ─────────────────────────────────────────────────
  #
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./VectorDatabaseService/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./VectorDatabaseService/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.13
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - ./VectorDatabaseService/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy

  #
  # ── Ollama (shared LLM) ───────────────────────────────────────────────────
  #
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 12

  #
  # ── Nenad's vector-database-service ──────────────────────────────────────
  #
  vector-database-service:
    build:
      context: ./VectorDatabaseService
      dockerfile: Dockerfile
    image: vector-database-service:latest
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      MILVUS_HOST: standalone
      MILVUS_PORT: 19530
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:1.5b
      APP_PORT: 8000
    volumes:
      - ./VectorDatabaseService/data:/app/data:ro
    depends_on:
      - eureka-server
      - ollama
      - standalone
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  streamlit:
    build:
      context: ./VectorDatabaseService
      dockerfile: Dockerfile.streamlit
    container_name: streamlit
    ports:
      - "8501:8501"
    environment:
      API_URL: "http://vector-database-service:8000"
    depends_on:
      - vector-database-service
    restart: on-failure

  attu:
    image: zilliz/attu:v2.4
    container_name: attu
    environment:
      MILVUS_URL: standalone:19530
    ports:
      - "3000:3000"
    depends_on:
      standalone:
        condition: service_healthy

  #
  # ── Search service ────────────────────────────────────────────────────────
  #
  search-service:
    build:
      context: ./SearchServiceV/search-service
      dockerfile: Dockerfile
    environment:
      MILVUS_HOST: standalone
      MILVUS_PORT: "19530"
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: nomic-embed-text
      SERVER_PORT: "8085"
    ports:
      - "8085:8085"
    depends_on:
      standalone:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: on-failure

  #
  # ── Neo4j + Recommendation service ───────────────────────────────────────
  #
  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  app:
    build:
      context: ./RecommendationGraphService
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: password
    depends_on:
      neo4j:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: on-failure

#
# ── Named volumes ─────────────────────────────────────────────────────────
#
volumes:
  ollama_data: {}
  neo4j_data:
  neo4j_logs:
